<div class="dashboard-layout">

  <app-sidebar></app-sidebar>

  <main class="main-content">

    <header class="dashboard-header">
      <div class="header-text">
        <h1>Dashboard Overview</h1>
        <p class="subtitle">Welcome back, Admin</p>
      </div>
      <div class="notification-bell">
        <span class="custom-mask bell-mask"></span>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-title">Pending Claims</span>
          <span class="stat-value">36</span>
        </div>
        <div class="stat-icon-box yellow-box">
          <span class="custom-mask exclamation-mask"></span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-title">Active Listings</span>
          <span class="stat-value">67</span>
        </div>
        <div class="stat-icon-box blue-box">
          <span class="custom-mask chart-mask"></span>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-info">
          <span class="stat-title">Settled Items</span>
          <span class="stat-value">23</span>
        </div>
        <div class="stat-icon-box green-box">
          <span class="custom-mask check-mask"></span>
        </div>
      </div>
    </div>

    <div class="chart-section-container">
      <div class="section-header">
        <h2>Submission Trends</h2>
      </div>
      <div class="chart-box">
        <canvas id="MyChart"></canvas>
      </div>
    </div>

  </main>
</div>
