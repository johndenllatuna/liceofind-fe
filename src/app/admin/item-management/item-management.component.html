<div class="dashboard-layout">

  <app-sidebar></app-sidebar> 

  <main class="main-content">

    <header class="page-header">
      <h1>Item Management</h1>
    </header>

    <div class="controls-section">
      <div class="search-bar">
        <span class="custom-mask search-icon-mask"></span>
        <input type="text" placeholder="What are you looking for?">
      </div>
      
      <div class="status-filter">
  <div class="custom-select" [class.open]="isDropdownOpen">
    
    <div class="selected-value" (click)="toggleDropdown()">
      <span class="status-dot" [ngClass]="selectedStatus"></span>
      {{ getStatusLabel(selectedStatus) }}
      <span class="arrow">▼</span>
    </div>
    
    @if (isDropdownOpen) {
      <ul class="options-list">
        <li (click)="selectStatus('all')">
          <span class="status-dot all"></span> All Status
        </li>
        <li (click)="selectStatus('pending')">
          <span class="status-dot pending"></span> Pending
        </li>
        <li (click)="selectStatus('claimed')">
          <span class="status-dot claimed"></span> Claimed
        </li>
        <li (click)="selectStatus('turned-over')">
          <span class="status-dot turned-over"></span> Turned Over
        </li>
        <li (click)="selectStatus('disposed')">
          <span class="status-dot disposed"></span> Disposed
        </li>
      </ul>
    }
  </div>
</div>
    </div>

    <div class="items-grid">
      
      @for (item of items; track item.id) {
        <div class="item-card">
          <div class="card-image">
            <img [src]="item.imageUrl" [alt]="item.name">
          </div>
          <div class="card-content">
            <h3>{{ item.name }}</h3>
            <p class="description">{{ item.description }}</p>
            
            <div class="meta-info">
              <div class="meta-row">
                <span class="custom-mask location-icon-mask"></span> <span>{{ item.location }}</span>
              </div>
              <div class="meta-row">
                <span class="custom-mask calendar-icon-mask"></span> <span>{{ item.date }}</span>
              </div>
            </div>

            <div class="card-actions">
              <button class="details-btn">Details</button>
            </div>
          </div>
        </div>
      } @empty {
        <p>No items found.</p>
      }
      
    </div> </main>
</div>
