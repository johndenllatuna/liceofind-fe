<div class="dashboard-layout">

  <app-sidebar></app-sidebar> 

  <main class="main-content">

    <header class="page-header">
      <h1>Item Management</h1>
    </header>

    <div class="controls-section">
      <div class="search-bar">
        <span class="custom-mask search-icon-mask"></span>
        <input type="text" placeholder="What are you looking for?">
      </div>
      
      <div class="status-filter">
        <select>
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="claimed">Claimed</option>
        </select>
      </div>
    </div>

    <div class="items-grid">
      @for (item of items; track item.id) {
    <div class="item-card">
      <div class="card-image">
        <img [src]="item.imageUrl" [alt]="item.name">
      </div>
      <div class="card-content">
        <h3>{{ item.name }}</h3>
        <p class="description">{{ item.description }}</p>
        
        <div class="meta-info">
          <div class="meta-row">
            <span class="custom-mask location-icon-mask"></span> <span>{{ item.location }}</span>
          </div>
          <div class="meta-row">
            <span class="custom-mask calendar-icon-mask"></span> <span>{{ item.date }}</span>
          </div>
        </div>

        <div class="card-actions">
          <button class="icon-btn">
            <span class="custom-mask edit-icon-mask"></span>
          </button>
          <button class="details-btn">Details</button>
        </div>
      </div>
    </div>
  } @empty {
    <p>No items found.</p>
  }
      <div class="items-grid">
  
  

</div>

    </div>
  </main>
</div>
