<aside class="sidebar">
  <div class="sidebar-header">
    <div class="admin-avatar">A</div>
    <span class="admin-name">Admin</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/admin-dashboard" routerLinkActive="active" class="nav-item">
      <span class="custom-mask dashboard-mask"></span> 
      <span class="nav-label">Dashboard</span>
    </a>
    
    <a routerLink="/item-management" routerLinkActive="active" class="nav-item">
      <span class="custom-mask box-mask"></span> 
      <span class="nav-label">Item Management</span>
    </a>
    
    <a routerLink="/claim-verification" routerLinkActive="active" class="nav-item">
      <span class="custom-mask check-mask"></span> 
      <span class="nav-label">Claim Verification</span>
      
      @if (pendingClaimsCount > 0) {
        <span class="badge-container">
          <span class="custom-mask circle-mask"></span>
          <span class="badge-number">{{ pendingClaimsCount }}</span>
        </span>
      }
    </a>
    
    <a routerLink="/post-item" routerLinkActive="active" class="nav-item">
      <span class="custom-mask plus-mask"></span> 
      <span class="nav-label">Post Item</span>
    </a>

    <a routerLink="/settled-items" routerLinkActive="active" class="nav-item">
      <span class="custom-mask history-mask"></span> 
      <span class="nav-label">Settled Items</span>
    </a>

    <a routerLink="/user-management" routerLinkActive="active" class="nav-item">
      <span class="custom-mask user-mask"></span> 
      <span class="nav-label">User Management</span>
    </a>
  </nav>

  <div class="bottom-links">
    <a href="#" class="nav-item" (click)="onSignOut($event)">
      <span class="custom-mask door-mask"></span> 
      <span class="nav-label">Sign Out</span>
    </a>
  </div>
</aside>

@if (showLogoutModal) {
  <div class="signout-overlay">
    <div class="signout-card">
      <h3 class="signout-title">Sign Out</h3>
      <p class="signout-subtext">Are you sure you want to end your session?</p>
      
      <div class="signout-actions">
        <button class="signout-btn-cancel" (click)="cancelLogout()">Cancel</button>
        <button class="signout-btn-confirm" (click)="confirmLogout()">Sign Out</button>
      </div>
    </div>
  </div>
}
