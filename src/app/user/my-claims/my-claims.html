<div class="page-container">
  <!-- ── Top App Bar ──────────────────────── -->
  <header class="top-bar">
    <a routerLink="/user/profile" class="top-bar__back-btn" aria-label="Back to Profile">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </a>
    <h1 class="top-bar__title">My Claims</h1>
    <div class="top-bar__placeholder"></div>
  </header>

  <!-- ── Main Content ──────────────────────── -->
  <main class="claims-main">
    <div class="claims-list">
      @for (claim of myClaims; track claim.id) {
        <div class="claim-item">
          <div class="claim-item__info">
            <h3 class="claim-item__title">{{ claim.itemName }}</h3>
            <p class="claim-item__sub">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              Claimed on {{ claim.dateClaimed }}
            </p>
          </div>
          <span
            class="claim-badge"
            [class.claim-badge--pending]="claim.status === 'Pending'"
            [class.claim-badge--verified]="claim.status === 'Verified'"
            [class.claim-badge--rejected]="claim.status === 'Rejected'"
          >
            {{ claim.status }}
          </span>
        </div>
      }

      @if (myClaims.length === 0) {
        <div class="claims-empty">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
          <p class="claims-empty__title">You have not claimed any items yet.</p>
          <p class="claims-empty__subtitle">When you claim an item, it will appear here.</p>
        </div>
      }
    </div>
  </main>
</div>
