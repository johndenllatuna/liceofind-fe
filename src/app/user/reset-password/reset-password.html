<!-- Parallax background layer -->
<div class="bg-parallax"></div>
<div class="bg-overlay"></div>

<!-- Bokeh ambient particles -->
<div class="bokeh-layer" aria-hidden="true">
  <span class="bokeh b1"></span>
  <span class="bokeh b2"></span>
  <span class="bokeh b3"></span>
  <span class="bokeh b4"></span>
  <span class="bokeh b5"></span>
  <span class="bokeh b6"></span>
</div>

<div class="login-wrapper">

  <!-- Glassmorphism card -->
  <main class="login-card">

    <header class="login-header">
      <div class="login-header__logo-wrap">
        <svg class="login-header__compass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
      </div>
      <div class="login-header__text">
        <h1 class="login-header__title">LDCUFind</h1>
        <p class="login-header__sub">Reset Password</p>
      </div>
    </header>

    @if (!successMode) {
      <form class="login-form" (ngSubmit)="onSubmit()">

        <!-- New Password -->
        <div class="field-group">
          <label class="field-label" for="new-password">New Password</label>
          <div class="field-input-wrap">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="new-password" class="field-input field-input--with-action"
              [type]="showNewPassword() ? 'text' : 'password'"
              placeholder="Enter new password"
              [(ngModel)]="newPassword" name="newPassword" required />
            <button class="field-action-btn" type="button" (click)="toggleNewPasswordVisibility()"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                @if (showNewPassword()) {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
                } @else {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                }
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field-group">
          <label class="field-label" for="confirm-password">Confirm Password</label>
          <div class="field-input-wrap">
            <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input id="confirm-password" class="field-input field-input--with-action"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              placeholder="Confirm new password"
              [(ngModel)]="confirmPassword" name="confirmPassword" required />
            <button class="field-action-btn" type="button" (click)="toggleConfirmPasswordVisibility()"
              aria-label="Toggle confirm password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                @if (showConfirmPassword()) {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
                } @else {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
                }
              </svg>
            </button>
          </div>
        </div>

        @if (passwordMismatch) {
        <div class="toast animate-slide-down" style="position: static; transform: none; width: 100%; max-width: none; border-left: 4px solid #d32f2f;">
          <svg class="toast__icon" style="color: #d32f2f;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <p class="toast__message">Passwords do not match.</p>
        </div>
        }

        <!-- Actions -->
        <div class="login-form__actions" style="margin-top: 10px;">
          <button class="btn-login" type="submit">
            <span class="btn-login__text">Save New Password</span>
            <svg class="btn-login__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
          <button class="btn-register" type="button" routerLink="/">
            Cancel
          </button>
        </div>

      </form>

    } @else {
      <!-- Success View -->
      <div class="reset-success" style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 0;">
        <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(34, 197, 94, 0.1); display: flex; align-items: center; justify-content: center; color: #22c55e;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
        </div>
        <div style="font-weight: 600; font-size: 1.1rem; color: #0f172a;">Password Updated</div>
        <p style="font-size: 0.9rem; color: #475569; margin: 0; line-height: 1.5;">Your password has been successfully reset! You can now log in.</p>
        
        <div style="margin-top: 20px; width: 100%;">
          <button class="btn-login" type="button" routerLink="/">
            <span class="btn-login__text">Go to Login</span>
            <svg class="btn-login__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>
      </div>
    }

  </main>
</div>
