<!-- Parallax background layers (controlled by TS) -->
<div class="bg-parallax" [style.transform]="bgTransform"></div>
<div class="bg-overlay"></div>

<!-- Bokeh ambient particles -->
<div class="bokeh-layer" aria-hidden="true">
  <span class="bokeh b1"></span>
  <span class="bokeh b2"></span>
  <span class="bokeh b3"></span>
  <span class="bokeh b4"></span>
  <span class="bokeh b5"></span>
  <span class="bokeh b6"></span>
</div>

<!-- Page wrapper -->
<div class="login-wrapper" [style.transform]="cardTransform">

  <!-- ── Frosted Glass Login Card ─────────── -->
  <main class="login-card">
    
    <!-- ── Brand Header ──────────────────────── -->
    <header class="login-header">
      <div class="login-header__logo-wrap">
        <!-- Ornate compass SVG (on-brand) -->
        <svg class="login-header__compass" xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
      </div>
      <div class="login-header__text">
        <h1 class="login-header__title">LDCUFind</h1>
        <p class="login-header__sub">Welcome back to the journey.</p>
      </div>
    </header>

    <form class="login-form" (ngSubmit)="handleLogin()">

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="login-email">Email</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input
            id="login-email"
            class="field-input"
            type="email"
            placeholder="name@example.com"
            autocomplete="email"
            [(ngModel)]="emailStr"
            name="email"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="login-password">Password</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            id="login-password"
            class="field-input field-input--with-action"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="current-password"
            [(ngModel)]="passwordStr"
            name="password"
          />
          <button
            class="field-action-btn"
            type="button"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @if (showPassword()) {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              } @else {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              }
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember Me + Forgot -->
      <div class="login-form__row">
        <label class="checkbox-label">
          <div class="checkbox-wrap">
            <input
              class="checkbox-input"
              type="checkbox"
              [(ngModel)]="rememberMe"
              name="rememberMe"
            />
            <svg class="checkbox-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <span class="checkbox-text">Remember Me</span>
        </label>
        <a class="forgot-link" href="#">Forgot Password?</a>
      </div>

      <!-- Actions -->
      <div class="login-form__actions">
        <button
          class="btn-login"
          type="submit"
          [class.btn-login--loading]="isLoading()"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner"></span>
            <span>Logging in...</span>
          } @else {
            <span class="btn-login__text">Log In</span>
            <svg class="btn-login__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          }
        </button>

        <button class="btn-register" type="button" [routerLink]="['/register']">
          Create an Account
        </button>
      </div>

    </form>
  </main>

</div>

<!-- Toast Notification -->
@if (showToast()) {
  <div class="toast animate-slide-down">
    <svg class="toast__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
      <line x1="12" y1="9" x2="12" y2="13"></line>
      <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <p class="toast__message">Invalid email or password. Please try again.</p>
  </div>
}
