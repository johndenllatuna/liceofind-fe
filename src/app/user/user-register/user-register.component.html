<!-- Parallax background layers (controlled by TS) -->
<div class="bg-parallax" [style.transform]="bgTransform"></div>
<div class="bg-overlay"></div>

<!-- Bokeh ambient particles -->
<div class="bokeh-layer" aria-hidden="true">
  <span class="bokeh b1"></span>
  <span class="bokeh b2"></span>
  <span class="bokeh b3"></span>
  <span class="bokeh b4"></span>
  <span class="bokeh b5"></span>
  <span class="bokeh b6"></span>
</div>

<!-- Page wrapper -->
<div class="login-wrapper" [style.transform]="cardTransform">

  <!-- ── Frosted Glass Register Card ─────────── -->
  <main class="login-card">

    <!-- ── Brand Header ──────────────────────── -->
    <header class="login-header">
      <div class="login-header__logo-wrap">
        <!-- User Register SVG -->
        <svg class="login-header__compass" xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>
      <div class="login-header__text">
        <h1 class="login-header__title">Create Account</h1>
        <p class="login-header__sub">Join LDCUFind today.</p>
      </div>
    </header>

    <form class="login-form" (ngSubmit)="handleRegister()">

      <!-- Full Name -->
      <div class="field-group">
        <label class="field-label" for="register-name">Full Name</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input
            id="register-name"
            class="field-input"
            type="text"
            placeholder="John Doe"
            autocomplete="name"
            [(ngModel)]="fullNameStr"
            name="fullName"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="register-email">Email Address</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input
            id="register-email"
            class="field-input"
            type="email"
            placeholder="name@example.com"
            autocomplete="email"
            [(ngModel)]="emailStr"
            name="email"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="register-password">Password</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            id="register-password"
            class="field-input field-input--with-action"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="new-password"
            [(ngModel)]="passwordStr"
            name="password"
          />
          <button
            class="field-action-btn"
            type="button"
            (click)="togglePasswordVisibility()"
            aria-label="Toggle password visibility"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @if (showPassword()) {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              } @else {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              }
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <label class="field-label" for="register-confirm-password">Confirm Password</label>
        <div class="field-input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            id="register-confirm-password"
            class="field-input field-input--with-action"
            [type]="showConfirmPassword() ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="new-password"
            [(ngModel)]="confirmPasswordStr"
            name="confirmPassword"
          />
          <button
            class="field-action-btn"
            type="button"
            (click)="toggleConfirmPasswordVisibility()"
            aria-label="Toggle confirm password visibility"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              @if (showConfirmPassword()) {
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              } @else {
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              }
            </svg>
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="login-form__actions">
        <button
          class="btn-login"
          type="submit"
          [class.btn-login--loading]="isLoading()"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <span class="spinner"></span>
            <span>Creating...</span>
          } @else {
            <span class="btn-login__text">Create Account</span>
            <svg class="btn-login__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          }
        </button>
      </div>

      <div class="login-form__row" style="justify-content: center; padding-top: 8px;">
        <a class="forgot-link" [routerLink]="['/']">Already have an account? Login here</a>
      </div>

    </form>
  </main>



</div>
